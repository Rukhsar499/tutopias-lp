<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
}

/* Background Image */
.thankyou-section {
    min-height: 100vh;
    background: url('./assets/img/universty.webp') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
}

/* 🔥 Blur + Dark Overlay */
.thankyou-section::before {
    content: "";
    position: absolute;
    inset: 0;

    background: rgba(0, 0, 0, 0.4); /* dark overlay */

    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);

    z-index: 1;
}

/* 🔥 Highlight Glass Card */
.glass-card {
    position: relative;
    z-index: 2;
    max-width: 700px;
    padding: 50px 40px;
    text-align: center;

    background: #0074bc;
    border-radius: 20px;

    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);

    border: 1px solid rgba(255, 255, 255, 0.3);

    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
}

/* Glass Card */


/* Text */
.thankyou-title {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    color: #fff;
    margin-bottom: 15px;
}

.thankyou-subtitle {
    font-size: 20px;
    color: #e0e0e0;
}

.thankyou-text {
    font-size: 16px;
    color: #dcdcdc;
    margin-top: 15px;
}

/* Divider */
.divider {
    width: 120px;
    height: 1px;
    background: rgba(255,255,255,0.4);
    margin: 20px auto;
    position: relative;
}

.divider::after {
    content: "•";
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
}

/* Side Images */
.side-img {
    position: absolute;
    bottom: 40px;
    width: 200px;
    opacity: 0.12;
    z-index: 1;
}

.left-img {
    left: 5%;
}

.right-img {
    right: 5%;
}

/* Responsive */
@media(max-width:768px){
    .thankyou-title {
        font-size: 32px;
    }

    .glass-card {
        padding: 30px 20px;
    }

    .side-img {
        width: 120px;
    }
}

@media(max-width:576px){
    .side-img {
        display: none;
    }
}

</style>
</head>

<body>

<section class="thankyou-section">

    <!-- Side Images -->
    <img src="left.png" class="side-img left-img">
    <img src="right.png" class="side-img right-img">

    <!-- Glass Card -->
    <div class="glass-card">
        <h1 class="thankyou-title">Thank You For Your Interest!</h1>

        <p class="thankyou-subtitle">
            Your submission has been received
        </p>

        <div class="divider"></div>

        <p class="thankyou-text">
            We will review your submission and respond as soon as possible.
           
        </p>
    </div>

</section>

</body>
</html>
